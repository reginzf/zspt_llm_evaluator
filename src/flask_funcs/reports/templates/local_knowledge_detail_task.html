<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <button class="action-btn create-metric-task-btn" onclick="showCreateMetricTaskDialog()">创建指标任务</button>
</div>
<div class="task-list">
    <table class="task-table">
        <thead>
            <tr>
                <th>质量报告ID</th>
                <th>标注任务ID/名称</th>
                <th>标注类型</th>
                <th>召回方式</th>
                <th>匹配方式</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="metricTaskTableBody">
            <tr>
                <td colspan="8" style="text-align: center;">加载中...</td>
            </tr>
        </tbody>
    </table>
</div>


<!-- 标注方式选择模态框 -->
<div id="annotationModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>选择标注方式</h2>
            <span class="close" onclick="hideAnnotationModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="radio-label">
                    <input type="radio" name="annotationType" value="llm" checked> LLM标注
                </label>
                <label class="radio-label">
                    <input type="radio" name="annotationType" value="manual"> 人工标注
                </label>
                <label class="radio-label">
                    <input type="radio" name="annotationType" value="mlb"> MLB标注
                </label>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="hideAnnotationModal()">取消</button>
            <button type="button" class="btn-confirm" onclick="confirmAnnotationType()">确定</button>
        </div>
    </div>
</div>

<!-- 质量计算方式选择模态框 -->
<div id="calculationModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>选择召回方式</h2>
            <span class="close" onclick="hideCalculationModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label for="searchTypeSelect">召回方式：</label>
                <select id="searchTypeSelect" class="form-control">
                    <option value="" disabled selected>请选择召回方式</option>
                    <option value="vectorSearch">向量检索</option>
                    <option value="hybridSearch">混合检索</option>
                    <option value="augmentedSearch">增强检索</option>
                </select>
            </div>
            <!-- 匹配方式更新区域（当原任务缺少匹配方式时显示） -->
            <div id="matchTypeUpdateSection" style="display: none; margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; background-color: #f9f9f9;">
                <h3 style="margin-top: 0; color: #d9534f;">需要设置匹配方式</h3>
                <p>当前任务缺少匹配方式信息，请设置：</p>
                <div class="form-group">
                    <label for="updateMatchTypeSelect">匹配方式：</label>
                    <select id="updateMatchTypeSelect" class="form-control" onchange="handleUpdateMatchTypeChange()">
                        <option value="" disabled selected>请选择匹配方式</option>
                        <option value="chunkIdMatch">切片ID匹配</option>
                        <option value="chunkTextMatch">切片语义匹配</option>
                    </select>
                </div>
                <div class="form-group" id="updateKnowledgeBaseGroup" style="display: none;">
                    <label for="updateKnowledgeBaseSelect">知识库：</label>
                    <select id="updateKnowledgeBaseSelect" class="form-control">
                        <option value="" disabled selected>请选择知识库</option>
                    </select>
                </div>
                <button type="button" class="btn-confirm" onclick="updateTaskMatchType()" style="margin-top: 10px;">更新匹配方式</button>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="hideCalculationModal()">取消</button>
            <button type="button" class="btn-confirm" onclick="confirmCalculationType()">确定</button>
        </div>
    </div>
</div>

<!-- 报告查看模态框 -->
<div id="reportModal" class="modal">
    <div class="modal-content large">
        <div class="modal-header">
            <h2>质量评估报告</h2>
            <span class="close" onclick="hideReportModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div id="reportContent">
                <!-- 报告内容将在这里动态加载 -->
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="hideReportModal()">关闭</button>
            <button type="button" class="btn-confirm" onclick="exportReport()">导出报告</button>
        </div>
    </div>
</div>

<!-- 创建指标任务模态框 -->
<div id="createMetricTaskModal" class="modal">
    <div class="modal-content" style="width: 600px;">
        <div class="modal-header">
            <h2>创建指标任务</h2>
            <span class="close" onclick="hideCreateMetricTaskModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label for="matchTypeSelect">匹配方式：</label>
                <select id="matchTypeSelect" class="form-control" onchange="handleMatchTypeChange()">
                    <option value="" disabled selected>请选择匹配方式</option>
                    <option value="chunkIdMatch">切片ID匹配</option>
                    <option value="chunkTextMatch">切片语义匹配</option>
                </select>
            </div>
            
            <div class="form-group" id="knowledgeBaseGroup" style="display: none;">
                <label for="knowledgeBaseSelect">知识库：</label>
                <select id="knowledgeBaseSelect" class="form-control">
                    <option value="" disabled selected>请选择知识库</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="taskSelect">标注任务：</label>
                <select id="taskSelect" class="form-control">
                    <option value="" disabled selected>请选择任务</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="hideCreateMetricTaskModal()">取消</button>
            <button type="button" class="btn-confirm" onclick="createMetricTask()">创建指标任务</button>
        </div>
    </div>
</div>

<!-- 任务ID隐藏字段，用于存储当前操作的任务ID -->
<input type="hidden" id="currentTaskId" value="">
