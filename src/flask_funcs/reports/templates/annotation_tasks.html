<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标注任务管理</title>
    
    <!-- 引入 Alpine.js (CDN) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- 引入公共组件 -->
    <script src="{{ url_for('static_bp.custom_js', filename='common_components.js') }}"></script>
    <script src="{{ url_for('static_bp.custom_js', filename='ui_components.js') }}"></script>
    
    <!-- 引入页面专用样式 -->
    <link rel="stylesheet" href="{{ url_for('static_bp.custom_css', filename='annotation_tasks.css') }}">
</head>
<body>
    <div class="container">
        <h1>标注任务管理</h1>
        
        <!-- 操作按钮和搜索区域 -->
        <div class="action-bar">
            <button class="btn btn-primary" onclick="showCreateTaskModal()">+ 创建任务</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索任务名称...">
                <button id="searchBtn" class="icon-btn" title="搜索">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
                <button id="refreshBtn" class="icon-btn" title="刷新列表">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"></path>
                        <path d="M3 3v9h9"></path>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- 任务表格区域 -->
        <div class="table-container">
            <table class="task-table">
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>任务名称</th>
                        <th>本地知识库 ID</th>
                        <th>本地知识库名称</th>
                        <th>问题集 ID</th>
                        <th>问题集名称</th>
                        <th>Label Studio 环境 ID</th>
                        <th>标注进度</th>
                        <th>状态</th>
                        <th>标注类型</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody">
                    <tr>
                        <td colspan="12" style="text-align: center;">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 分页区域 -->
        <div id="paginationArea"></div>
    </div>
    
    <!-- 创建/编辑任务模态框 -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="taskModalTitle">创建标注任务</h3>
                <span class="close" onclick="hideTaskModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    
                    <div class="form-group">
                        <label for="taskName">任务名称 *</label>
                        <input type="text" id="taskName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskKnowledgeBaseSelect">本地知识库 *</label>
                        <select id="taskKnowledgeBaseSelect" required onchange="loadQuestionSetsForKnowledgeBase()">
                            <option value="">请选择知识库</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskQuestionSet">问题集 *</label>
                        <select id="taskQuestionSet" required>
                            <option value="">请先选择知识库</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskEnvironment">Label Studio 环境 *</label>
                        <input type="text" id="taskEnvironmentDisplay" readonly style="background-color: #f5f5f5;">
                        <select id="taskEnvironment" style="display: none;">
                            <option value="">请选择环境</option>
                        </select>
                    </div>
                    
                    <div class="form-group" id="taskStatusGroup" style="display: none;">
                        <label for="taskStatus">任务状态</label>
                        <select id="taskStatus">
                            <option value="未开始">未开始</option>
                            <option value="标注中">标注中</option>
                            <option value="已完成">已完成</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskAnnotationType">标注类型</label>
                        <select id="taskAnnotationType">
                            <option value="">请选择标注类型</option>
                            <option value="llm">LLM 标注</option>
                            <option value="manual">人工标注</option>
                            <option value="mlb">MLB 标注</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideTaskModal()">取消</button>
                <button class="btn btn-primary" onclick="saveTask()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 引入页面专用脚本 -->
    <script src="{{ url_for('static_bp.custom_js', filename='annotation_tasks.js') }}"></script>
</body>
</html>
