<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环境管理</title>
    <link rel="stylesheet" href="{{ css_path }}">
    {% if js_url %}
    <script src="{{ js_url }}"></script>
    {% endif %}
    <style>
        .environment-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        
        .search-container {
            display: flex;
            align-items: center;
        }
        
        .search-container input {
            padding: 8px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        .search-container button {
            padding: 8px 15px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .search-container button:hover {
            background-color: #5a67d8;
        }
        
        .table-container {
            padding: 0 10px;
            overflow-x: auto;
        }
        
        .btn {
            padding: 6px 12px;
            margin: 0 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .btn-create {
            background-color: #28a745;
            color: white;
        }
        
        .btn-edit {
            background-color: #ffc107;
            color: #212529;
        }
        
        .btn-delete {
            background-color: #dc3545;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 50%;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .modal-header h2 {
            margin: 0;
        }
        
        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: black;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .form-actions {
            text-align: right;
            margin-top: 20px;
        }
        
        .form-actions button {
            padding: 8px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .btn-confirm {
            background-color: #28a745;
            color: white;
        }
        
        .btn-cancel {
            background-color: #6c757d;
            color: white;
        }
        
        .btn-confirm-delete {
            background-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>环境管理</h1>
        <p>管理系统中的环境配置</p>
    </div>
    
    <div class="panel">
        <div class="environment-actions">
            <button class="btn btn-create" onclick="showCreateModal()">创建</button>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="搜索环境..." onkeyup="searchEnvironments()">
                <button onclick="searchEnvironments()">搜索</button>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>环境名称\ID</th>
                        <th>基础URL</th>
                        <th>domain</th>
                        <th>管理账号</th>
                        <th>密码</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="environmentTableBody">
                    {% for env in environment_list %}
                    <tr>
                        <td>{{ env.zlpt_name }}<br><small>{{ env.zlpt_base_id }}</small></td>
                        <td>{{ env.zlpt_base_url }}</td>
                        <td>{{ env.domain }}</td>
                        <td>{{ env.username }}</td>

                        <td>
                            <span class="password-text" style="display: inline;">********</span>
                            <span class="password-toggle" style="cursor: pointer; margin-left: 10px;" onclick="togglePasswordVisibility(this, '{{ env.password }}')">👁️</span>
                        </td>
                        <td>
                            <button class="btn btn-edit" onclick="showEditModal('{{ env.zlpt_base_id }}', '{{ env.zlpt_name }}', '{{ env.zlpt_base_url }}', '{{ env.domain }}', '{{ env.username }}', '{{ env.password }}')">编辑</button>
                            <button class="btn btn-delete" onclick="showDeleteModal('{{ env.zlpt_base_id }}', '{{ env.zlpt_name }}')">删除</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 创建/编辑环境模态框 -->
    <div id="environmentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">创建环境</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="environmentForm">
                <div class="form-group">
                    <label for="zlpt_base_id">环境ID</label>
                    <input type="text" id="zlpt_base_id" name="zlpt_base_id" readonly>
                </div>
                <div class="form-group">
                    <label for="zlpt_name">环境名称 *</label>
                    <input type="text" id="zlpt_name" name="zlpt_name" required>
                </div>
                <div class="form-group">
                    <label for="zlpt_base_url">基础URL *</label>
                    <input type="text" id="zlpt_base_url" name="zlpt_base_url" required>
                </div>
                <div class="form-group">
                    <label for="domain">域名 *</label>
                    <input type="text" id="domain" name="domain" required>
                </div>
                <div class="form-group">
                    <label for="username">用户名 *</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密码 *</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn-confirm" id="saveBtn">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 删除确认模态框 -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>确认删除</h2>
                <span class="close" onclick="closeDeleteModal()">&times;</span>
            </div>
            <p>确定要删除环境 "<span id="deleteEnvName"></span>" 吗？此操作不可撤销。</p>
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="closeDeleteModal()">取消</button>
                <button type="button" class="btn-confirm-delete" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
