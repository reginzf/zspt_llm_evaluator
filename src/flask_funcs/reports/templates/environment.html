<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环境管理</title>
    <link rel="stylesheet" href="{{ css_path }}">
    <style>
        .environment-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        
        .search-container {
            display: flex;
            align-items: center;
        }
        
        .search-container input {
            padding: 8px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        .search-container button {
            padding: 8px 15px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .search-container button:hover {
            background-color: #5a67d8;
        }
        
        .table-container {
            padding: 0 10px;
            overflow-x: auto;
        }
        
        .btn {
            padding: 6px 12px;
            margin: 0 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .btn-create {
            background-color: #28a745;
            color: white;
        }
        
        .btn-edit {
            background-color: #ffc107;
            color: #212529;
        }
        
        .btn-delete {
            background-color: #dc3545;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 50%;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .modal-header h2 {
            margin: 0;
        }
        
        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: black;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .form-actions {
            text-align: right;
            margin-top: 20px;
        }
        
        .form-actions button {
            padding: 8px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .btn-confirm {
            background-color: #28a745;
            color: white;
        }
        
        .btn-cancel {
            background-color: #6c757d;
            color: white;
        }
        
        .btn-confirm-delete {
            background-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>环境管理</h1>
        <p>管理系统中的环境配置</p>
    </div>
    
    <div class="panel">
        <div class="environment-actions">
            <button class="btn btn-create" onclick="showCreateModal()">创建</button>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="搜索环境..." onkeyup="searchEnvironments()">
                <button onclick="searchEnvironments()">搜索</button>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>环境名称\ID</th>
                        <th>基础URL</th>
                        <th>domain</th>
                        <th>管理账号</th>
                        <th>密码</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="environmentTableBody">
                    {% for env in environment_list %}
                    <tr>
                        <td>{{ env.zlpt_name }}<br><small>{{ env.zlpt_base_id }}</small></td>
                        <td>{{ env.zlpt_base_url }}</td>
                        <td>{{ env.domain }}</td>
                        <td>{{ env.username }}</td>

                        <td>
                            <span class="password-text" style="display: inline;">********</span>
                            <span class="password-toggle" style="cursor: pointer; margin-left: 10px;" onclick="togglePasswordVisibility(this, '{{ env.password }}')">👁️</span>
                        </td>
                        <td>
                            <button class="btn btn-edit" onclick="showEditModal('{{ env.zlpt_base_id }}', '{{ env.zlpt_name }}', '{{ env.zlpt_base_url }}', '{{ env.domain }}', '{{ env.username }}', '{{ env.password }}')">编辑</button>
                            <button class="btn btn-delete" onclick="showDeleteModal('{{ env.zlpt_base_id }}', '{{ env.zlpt_name }}')">删除</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 创建/编辑环境模态框 -->
    <div id="environmentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">创建环境</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="environmentForm">
                <div class="form-group">
                    <label for="zlpt_base_id">环境ID</label>
                    <input type="text" id="zlpt_base_id" name="zlpt_base_id" readonly>
                </div>
                <div class="form-group">
                    <label for="zlpt_name">环境名称 *</label>
                    <input type="text" id="zlpt_name" name="zlpt_name" required>
                </div>
                <div class="form-group">
                    <label for="zlpt_base_url">基础URL *</label>
                    <input type="text" id="zlpt_base_url" name="zlpt_base_url" required>
                </div>
                <div class="form-group">
                    <label for="domain">域名 *</label>
                    <input type="text" id="domain" name="domain" required>
                </div>
                <div class="form-group">
                    <label for="username">用户名 *</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密码 *</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn-confirm" id="saveBtn">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 删除确认模态框 -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>确认删除</h2>
                <span class="close" onclick="closeDeleteModal()">&times;</span>
            </div>
            <p>确定要删除环境 "<span id="deleteEnvName"></span>" 吗？此操作不可撤销。</p>
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="closeDeleteModal()">取消</button>
                <button type="button" class="btn-confirm-delete" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentAction = '';
    let deleteEnvId = '';
    
    // 显示创建模态框
    function showCreateModal() {
        currentAction = 'create';
        document.getElementById('modalTitle').textContent = '创建环境';
        document.getElementById('environmentForm').reset();
        document.getElementById('zlpt_base_id').value = '';
        document.getElementById('zlpt_base_id').disabled = false; // 在创建时ID字段可编辑
        document.getElementById('zlpt_name').disabled = false;
        document.getElementById('saveBtn').textContent = '创建';
        document.getElementById('environmentModal').style.display = 'block';
    }
    
    // 显示编辑模态框
    function showEditModal(id, name, url, domain, username, password) {
        currentAction = 'edit';
        document.getElementById('modalTitle').textContent = '编辑环境';
        document.getElementById('zlpt_base_id').value = id;
        document.getElementById('zlpt_name').value = name;
        document.getElementById('zlpt_base_url').value = url;
        document.getElementById('domain').value = domain;
        document.getElementById('username').value = username;
        document.getElementById('password').value = password;
        document.getElementById('zlpt_base_id').disabled = true; // ID不可编辑
        document.getElementById('saveBtn').textContent = '更新';
        document.getElementById('environmentModal').style.display = 'block';
    }
    
    // 显示删除模态框
    function showDeleteModal(id, name) {
        deleteEnvId = id;
        document.getElementById('deleteEnvName').textContent = name;
        document.getElementById('deleteModal').style.display = 'block';
    }
    
    // 关闭模态框
    function closeModal() {
        document.getElementById('environmentModal').style.display = 'none';
    }
    
    function closeDeleteModal() {
        document.getElementById('deleteModal').style.display = 'none';
        deleteEnvId = '';
    }
    
    // 搜索环境
    function searchEnvironments() {
        const input = document.getElementById('searchInput');
        const filter = input.value.toUpperCase();
        const table = document.getElementById('environmentTableBody');
        const rows = table.getElementsByTagName('tr');
        
        for (let i = 0; i < rows.length; i++) {
            const cells = rows[i].getElementsByTagName('td');
            let found = false;
            
            for (let j = 0; j < cells.length - 1; j++) { // 不搜索操作列
                if (cells[j].textContent.toUpperCase().indexOf(filter) > -1) {
                    found = true;
                    break;
                }
            }
            
            if (found) {
                rows[i].style.display = '';
            } else {
                rows[i].style.display = 'none';
            }
        }
    }
    
    // 表单提交事件
    document.getElementById('environmentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const data = Object.fromEntries(formData);
        
        if (currentAction === 'create') {
            createEnvironment(data);
        } else if (currentAction === 'edit') {
            updateEnvironment(data);
        }
    });
    
    // 创建环境
    function createEnvironment(data) {
        fetch('/environment/create/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                alert('环境创建成功');
                closeModal();
                location.reload(); // 刷新页面以显示新环境
            } else {
                alert('创建失败: ' + result.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('创建失败: ' + error.message);
        });
    }
    
    // 更新环境
    function updateEnvironment(data) {
        fetch(`/environment/update/${data.zlpt_base_id}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                zlpt_name: data.zlpt_name,
                zlpt_base_url: data.zlpt_base_url,
                domain: data.domain,
                username: data.username,
                password: data.password
            })
        })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                alert('环境更新成功');
                closeModal();
                location.reload(); // 刷新页面以显示更新后的环境
            } else {
                alert('更新失败: ' + result.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('更新失败: ' + error.message);
        });
    }
    
    // 确认删除
    function confirmDelete() {
        fetch(`/environment/delete/`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                zlpt_base_id: deleteEnvId
            })
        })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                alert('环境删除成功');
                closeDeleteModal();
                location.reload(); // 刷新页面以移除删除的环境
            } else {
                alert('删除失败: ' + result.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('删除失败: ' + error.message);
        });
    }

    // 切换密码可见性
    function togglePasswordVisibility(element, password) {
        const passwordSpan = element.previousElementSibling;
        if (passwordSpan.textContent === '********') {
            passwordSpan.textContent = password;
            element.textContent = '🙈'; // 改为隐藏图标
        } else {
            passwordSpan.textContent = '********';
            element.textContent = '👁️'; // 显示图标
        }
    }
    
    // 点击模态框外部关闭模态框
    window.onclick = function(event) {
        const environmentModal = document.getElementById('environmentModal');
        const deleteModal = document.getElementById('deleteModal');
        
        if (event.target === environmentModal) {
            closeModal();
        }
        
        if (event.target === deleteModal) {
            closeDeleteModal();
        }
    }
</script>
</body>
</html>
