<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or '知识平台详情' }}</title>
    <link rel="stylesheet" href="{{ css_path }}">
</head>
<body>
    <div class="container">
        <h1>{{ heading or '知识平台详细信息' }}</h1>
        
        <!-- 环境详情部分 -->
        <div class="environment-detail">
            <h2>环境信息</h2>
            <div class="detail-card">
                <div class="detail-row">
                    <label>平台ID:</label>
                    <span>{{ environment.zlpt_base_id }}</span>
                </div>
                <div class="detail-row">
                    <label>平台名称:</label>
                    <span>{{ environment.zlpt_name }}</span>
                </div>
                <div class="detail-row">
                    <label>平台URL:</label>
                    <span>{{ environment.zlpt_base_url }}</span>
                </div>
                <div class="detail-row">
                    <label>用户名:</label>
                    <span>{{ environment.username }}</span>
                </div>
                <div class="detail-row">
                    <label>域:</label>
                    <span>{{ environment.domain }}</span>
                </div>
                <div class="detail-row">
                    <label>创建时间:</label>
                    <span>{{ environment.created_at }}</span>
                </div>
                <div class="detail-row">
                    <label>更新时间:</label>
                    <span>{{ environment.updated_at }}</span>
                </div>
            </div>
        </div>
        
        <!-- 知识库列表部分 -->
        <div class="knowledge-base-list">
            <div class="list-header">
                <h2>知识库列表</h2>
                <div class="list-controls">
                    <button class="create-btn" onclick="createKnowledgeBase()">创建知识库</button>
                    <select class="search-field">
                        <option value="knowledge_name">名称</option>
                        <option value="knowledge_id">ID</option>
                        <option value="chunk_size">分块大小</option>
                        <option value="chunk_overlap">分块重叠</option>
                        <option value="visiblerange">可见范围</option>
                        <option value="all">全部</option>
                    </select>
                    <input type="text" class="search-box" placeholder="搜索知识库...">
                    <button class="search-btn" onclick="searchKnowledgeBases()">搜索</button>
                </div>
            </div>
            
            <div class="knowledge-base-items" id="knowledgeBaseTable">
                
                <!-- 知识库表格头部模板 -->
                <template id="knowledge-base-table-header-template">
                    <div class="knowledge-base-table-header">
                        <div class="table-header-cell">名称/ID</div>
                        <div class="table-header-cell">根ID</div>
                        <div class="table-header-cell">分块大小</div>
                        <div class="table-header-cell">分块重叠</div>
                        <div class="table-header-cell">可见范围</div>
                        <div class="table-header-cell">创建时间</div>
                        <div class="table-header-cell">编辑时间</div>
                        <div class="table-header-cell">操作</div>
                    </div>
                </template>
                
                <!-- 知识库行模板 -->
                <template id="knowledge-base-table-row-template">
                    <div class="knowledge-base-table-row">
                        <div class="table-cell" data-label="名称/ID">
                            <div class="knowledge-name"></div>
                            <div class="knowledge-id"></div>
                        </div>
                        <div class="table-cell" data-label="根ID"></div>
                        <div class="table-cell" data-label="分块大小"></div>
                        <div class="table-cell" data-label="分块重叠"></div>
                        <div class="table-cell" data-label="可见范围"></div>
                        <div class="table-cell" data-label="创建时间"></div>
                        <div class="table-cell" data-label="编辑时间"></div>
                        <div class="table-cell actions-cell" data-label="操作">
                            <button class="action-btn edit-btn">编辑</button>
                            <button class="action-btn delete-btn">删除</button>
                        </div>
                    </div>
                </template>
                
                <!-- 空状态模板 -->
                <template id="empty-state-template">
                    <div class="empty-state">
                        <p>暂无知识库</p>
                    </div>
                </template>
            </div>
        </div>
    </div>
    
    <script src="{{ js_url }}"></script>
</body>
</```
