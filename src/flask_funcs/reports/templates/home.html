<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问答系统召回质量评估报告服务</title>
    <link rel="stylesheet" href="{{ css_path }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>问答系统召回质量评估报告服务</h1>
            <p>基于向量检索结果的质量分析系统</p>
        </div>

        <div class="content">
            <div class="card">
                <h2>服务说明</h2>
                <p>本系统提供问答系统召回质量的评估报告，基于精确率、召回率、F1分数等指标进行分析。</p>
            </div>

            <div class="card">
                <h2>可用功能</h2>
                <ul>
                    <li><a href="/environment/">查看环境列表</a> - 管理知识库环境信息</li>
                    <li><a href="/metric_data/">查看报告列表</a> - 浏览所有可用的评估报告</li>
                    <li>分析召回质量 - 对检索结果进行精确率、召回率等指标分析</li>
                    <li>可视化展示 - 以图表形式展示分析结果</li>
                </ul>
            </div>

            <div class="card">
                <h2>快速访问</h2>
                <div class="button-group">
                    <a href="/metric_data/">
                        <button class="primary-btn">查看报告列表</button>
                    </a>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>问答系统质量评估报告 | 服务状态：正常运行</p>
        </div>
    </div>
</body>
</html>
