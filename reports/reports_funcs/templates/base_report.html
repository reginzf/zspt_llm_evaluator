<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}问答系统召回质量评估报告{% endblock %}</title>
    <link rel="stylesheet" href="{{ css_path }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body>
<div class="container">
    {% block header %}
    <div class="header">
        <h1>问答系统召回质量评估报告</h1>
        <p>基于{{ question_count }}个问题的向量检索结果分析</p>
        <p>生成时间：{{ timestamp }}</p>
    </div>
    {% endblock %}

    {% block content %}{% endblock %}

    {% block footer %}
    <div class="footer">
        <p>问答系统质量评估报告 | 生成时间：{{ timestamp }}</p>
        <p>注：所有指标基于向量检索结果与人工标注的对比分析</p>
    </div>
    {% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
